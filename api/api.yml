openapi: 3.0.3
info:
  title: Taiga Clone API
  description: API RESTful para la gestió d'Issues del projecte ASW (Segon Lliurament).
  version: 1.0.0
servers:
  - url: https://taiga-app.onrender.com/api/v1
    description: Servidor de Producció (Render)
  - url: http://localhost:3000/api/v1
    description: Servidor Local
  - url: http://localhost:8080/api/v1
    description: Servidor Local (AWS Cloud9)

# Seguretat a nivel global
security:
  - ApiKeyHeader: []
  - ApiKeyParam: []

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Clau d'API enviada a la capçalera (Recomanat).
    ApiKeyParam:
      type: apiKey
      in: query
      name: api_key
      description: Clau d'API enviada com a paràmetre a la URL.

  schemas:
    # configuracio
    Status:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'New' }
        color: { type: string, example: '#83EEDE' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Priority:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'High' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Severity:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Important' }
        color: { type: string, example: '#E4A33D' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    IssueType:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Bug' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Tag:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Frontend' }
        color: { type: string, example: '#00b19d' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DeadlineShortcut:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Next Week' }
        offset_days: { type: integer, example: 7 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # models principals
    User:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        username: { type: string, example: 'carlesf' }
        email: { type: string, example: 'carlesf@example.com' }
        description: { type: string, example: 'Faculty member at UPC', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: integer, format: int64, example: 101 }
        subject: { type: string, example: 'Fix broken urls in main page' }
        description: { type: string, example: 'It is trivial to implement.', nullable: true }
        user_id: { type: integer, format: int64, example: 1 }
        status_id: { type: integer, format: int64, example: 1, nullable: true }
        priority_id: { type: integer, format: int64, example: 2, nullable: true }
        severity_id: { type: integer, format: int64, example: 3, nullable: true }
        issue_type_id: { type: integer, format: int64, example: 1, nullable: true }
        assigned_to_id: { type: integer, format: int64, example: 2, nullable: true }
        deadline: { type: string, format: date, example: '2026-05-10', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        content: { type: string, example: 'No way, man!' }
        issue_id: { type: integer, format: int64, example: 101 }
        user_id: { type: integer, format: int64, example: 2 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Attachment:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        filename: { type: string, example: 'document.pdf' }
        content_type: { type: string, example: 'application/pdf' }
        byte_size: { type: integer, example: 10245 }
        url: { type: string, example: 'http://localhost:3000/rails/active_storage/...' }
        created_at: { type: string, format: date-time }

    # errors
    ErrorResult:
      type: object
      properties:
        error:
          type: string
          example: 'API Key invàlida o inexistent'
      required:
        - error

  # Exemples de respostes d'error
  examples:
    error401:
      value:
        error: "API Key invàlida o inexistent"
    error404:
      value:
        error: "Recurs no trobat"
    error422:
      value:
        error: "La validació ha fallat: Subject no pot estar en blanc"

paths:

  /users/{id}:
    get:
      summary: Obtener perfil de un usuario
      tags: [Users]
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Datos del usuario (incluye URL del avatar)
        '404':
          description: Usuario no encontrado

  /users/{id}/assigned_issues:
    get:
      summary: Obtener issues asignadas a un usuario
      tags: [Users]
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: sort
          schema:
            type: string
          description: 'Columna de ordenación (ej: created_at, subject)'
        - in: query
          name: direction
          schema:
            type: string
            enum: [asc, desc]
          description: 'Dirección de la ordenación'
      responses:
        '200':
          description: Lista de issues

  /users/{id}/watched_issues:
    get:
      summary: Obtener issues observadas (Solo el propio usuario)
      tags: [Users]
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de issues
        '403':
          description: No tienes permiso para ver esto

  /profile:
    patch:
      summary: Actualizar propio perfil (Bio y Avatar)
      tags: [Users]
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Nueva biografía
                avatar:
                  type: string
                  format: binary
                  description: Imagen para el avatar
      responses:
        '200':
          description: Perfil actualizado
        '422':
          description: Error de validación

  /issues:
    get:
      tags:
        - Issues
      summary: Llista totes les incidències (Issues) amb filtres i ordenació.
      operationId: getAllIssues
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: query
          in: query
          description: Cerca de text al 'subject' o 'description'.
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Columna per ordenar.
          required: false
          schema:
            type: string
            enum: [id, type, severity, priority, deadline, status, creator, assignee]
        - name: direction
          in: query
          description: Direcció de l'ordenació (asc o desc).
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: type
          in: query
          description: Filtrar pel nom exacte del tipus.
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Filtrar pel nom exacte de l'estat.
          required: false
          schema:
            type: string
        - name: severity
          in: query
          description: Filtrar pel nom exacte de la severitat.
          required: false
          schema:
            type: string
        - name: priority
          in: query
          description: Filtrar pel nom exacte de la prioritat.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Operació reeixida. Retorna la llista d'incidències filtrada.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
              example:
                - id: 101
                  subject: "Fix broken urls in main page"
                  description: "It is trivial to implement."
                  user_id: 1
                  status_id: 1
                  priority_id: 2
                  severity_id: 3
                  issue_type_id: 1
                  assigned_to_id: 2
                  deadline: "2026-05-10"
                  created_at: "2026-05-06T21:52:19.022Z"
                  updated_at: "2026-05-06T21:52:19.022Z"
        '401':
          description: No autoritzat. L'API Key és incorrecta o no s'ha enviat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '500':
          description: Error intern del servidor en processar la cerca o l'ordenació.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              example:
                error: "S'ha produït un error inesperat a la base de dades"

    post:
      tags:
        - Issues
      summary: Crea una nova incidència (Issue).
      operationId: createIssue
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        description: Dades de la nova incidència.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subject
              properties:
                subject:
                  type: string
                  example: 'Fix broken API endpoint'
                description:
                  type: string
                  example: 'The endpoint /api/v1/users is returning a 500 error.'
                status_id:
                  type: integer
                  example: 1
                priority_id:
                  type: integer
                  example: 2
                severity_id:
                  type: integer
                  example: 3
                issue_type_id:
                  type: integer
                  example: 1
                assigned_to_id:
                  type: integer
                  example: 2
                deadline:
                  type: string
                  format: date
                  example: '2026-05-20'
                tag_ids:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        '201':
          description: Incidència creada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '422':
          description: Entitat no processable (Errors de validació).

  /issues/bulk:
    post:
      tags:
        - Issues
      summary: Inserció massiva d'incidències.
      description: Permet crear múltiples incidències enviant un text on cada línia serà el títol (subject) d'una incidència nova.
      operationId: createBulkIssues
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        description: Text amb els títols de les noves incidències.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: "Text amb els títols de les incidències separats per salts de línia."
                  example: "Falta el botó de login\nLa imatge no carrega\nCal actualitzar la base de dades"
      responses:
        '201':
          description: Incidències creades correctament.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "S'han creat 3 incidències correctament"
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '422':
          description: Text buit o error de validació.

  /issues/{id}:
    get:
      tags:
        - Issues
      summary: Obté els detalls d'una incidència (Issue) pel seu ID.
      operationId: getIssueById
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
    put:
      tags:
        - Issues
      summary: Actualitza una incidència (només pel creador).
      operationId: updateIssue
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                description:
                  type: string
                status_id:
                  type: integer
                priority_id:
                  type: integer
                severity_id:
                  type: integer
                issue_type_id:
                  type: integer
                assigned_to_id:
                  type: integer
                deadline:
                  type: string
                  format: date
                tag_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Incidència actualitzada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '403':
          description: Prohibit. No ets el creador de la incidència.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '404':
          description: Recurs no trobat.
        '422':
          description: Errors de validació.
    delete:
      tags:
        - Issues
      summary: Elimina una incidència (només pel creador).
      operationId: deleteIssue
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Eliminat correctament (Sense contingut).
        '401':
          description: No autoritzat.
        '403':
          description: Prohibit. No ets el creador de la incidència.
        '404':
          description: Recurs no trobat.

  /issues/{issue_id}/watching:
    get:
      tags:
        - Watchers
      summary: Llista tots els watchers d'una incidència.
      operationId: getIssueWatchers
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: issue_id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida. Retorna la llista d'usuaris (watchers).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: No autoritzat.
        '404':
          description: Incidència no trobada.
          
    post:
      tags:
        - Watchers
      summary: Afegeix un watcher a una incidència.
      operationId: addWatcher
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: issue_id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: "ID de l'usuari a afegir. Si no s'envia, s'afegeix l'usuari de l'API Key actual."
      responses:
        '201':
          description: Watcher afegit correctament.
        '200':
          description: L'usuari ja era un watcher.
        '401':
          description: No autoritzat.
        '404':
          description: Incidència o usuari no trobat.

    delete:
      tags:
        - Watchers
      summary: Elimina un watcher d'una incidència.
      operationId: removeWatcher
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: issue_id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
        - name: user_id
          in: query
          description: "ID de l'usuari a eliminar. Si no s'envia, s'elimina l'usuari de l'API Key actual."
          required: false
          schema:
            type: integer
      responses:
        '204':
          description: Watcher eliminat correctament (Sense contingut).
        '401':
          description: No autoritzat.
        '404':
          description: Incidència o usuari no trobat.

  /issues/{issue_id}/comments:
    get:
      tags:
        - Comments
      summary: Llista tots els comentaris d'una incidència.
      operationId: getIssueComments
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: issue_id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          description: Incidència no trobada.

    post:
      tags:
        - Comments
      summary: Crea un comentari en una incidència.
      operationId: createComment
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: issue_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  example: 'Estic d’acord amb la prioritat d’aquest bug.'
      responses:
        '201':
          description: Comentari creat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          description: No autoritzat.
        '404':
          description: Incidència no trobada.
        '422':
          description: Errors de validació.

  /comments/{id}:
    put:
      tags:
        - Comments
      summary: Actualitza un comentari (només pel creador).
      operationId: updateComment
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comentari actualitzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          description: No autoritzat.
        '403':
          description: Prohibit. No ets el creador del comentari.
        '404':
          description: Comentari no trobat.
        '422':
          description: Errors de validació.

    delete:
      tags:
        - Comments
      summary: Elimina un comentari (només pel creador).
      operationId: deleteComment
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Eliminat correctament.
        '401':
          description: No autoritzat.
        '403':
          description: Prohibit. No ets el creador del comentari.
        '404':
          description: Comentari no trobat.

  /statuses:
    get:
      tags:
        - Statuses
      summary: Llista tots els estats (Statuses).
      operationId: getAllStatuses
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'

    post:
      tags:
        - Statuses
      summary: Crea un nou estat (Status).
      operationId: createStatus
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        description: Dades del nou estat.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: 'Blocked'
                color:
                  type: string
                  example: '#000000'
      responses:
        '201':
          description: Estat creat correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '422':
          description: Entitat no processable (Errors de validació).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error422'

  /statuses/{id}:
    get:
      tags:
        - Statuses
      summary: Obté un estat (Status) pel seu ID.
      operationId: getStatusById
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          description: ID de l'estat.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'

    put:
      tags:
        - Statuses
      summary: Actualitza un estat (Status) existent.
      operationId: updateStatus
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
      responses:
        '200':
          description: Estat actualitzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
