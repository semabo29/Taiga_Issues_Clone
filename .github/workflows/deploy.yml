name: Auto Deploy to Render Branch
on:
  push:
    branches:
      - main  

jobs:
  sync-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update RenderDeploy branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout /RenderDeploy
          git merge main
          git push origin /RenderDeploy