openapi: 3.0.3
info:
  title: Taiga Clone API
  description: API RESTful para la gestió d'Issues del projecte ASW (Segon Lliurament).
  version: 1.0.0
servers:
  - url: /api/v1
    description: Servidor principal
    
# Seguretat a nivel global
security:
  - ApiKeyHeader: []
  - ApiKeyParam: []

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Clau d'API enviada a la capçalera (Recomanat).
    ApiKeyParam:
      type: apiKey
      in: query
      name: api_key
      description: Clau d'API enviada com a paràmetre a la URL.

  schemas:
    # configuracio
    Status:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'New' }
        color: { type: string, example: '#83EEDE' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Priority:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'High' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Severity:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Important' }
        color: { type: string, example: '#E4A33D' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    IssueType:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Bug' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Tag:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Frontend' }
        color: { type: string, example: '#00b19d' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # models principals
    User:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        username: { type: string, example: 'carlesf' }
        email: { type: string, example: 'carlesf@example.com' }
        description: { type: string, example: 'Faculty member at UPC', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: integer, format: int64, example: 101 }
        subject: { type: string, example: 'Fix broken urls in main page' }
        description: { type: string, example: 'It is trivial to implement.', nullable: true }
        user_id: { type: integer, format: int64, example: 1 }
        status_id: { type: integer, format: int64, example: 1, nullable: true }
        priority_id: { type: integer, format: int64, example: 2, nullable: true }
        severity_id: { type: integer, format: int64, example: 3, nullable: true }
        issue_type_id: { type: integer, format: int64, example: 1, nullable: true }
        assigned_to_id: { type: integer, format: int64, example: 2, nullable: true }
        deadline: { type: string, format: date, example: '2026-05-10', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        content: { type: string, example: 'No way, man!' }
        issue_id: { type: integer, format: int64, example: 101 }
        user_id: { type: integer, format: int64, example: 2 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # errors
    ErrorResult:
      type: object
      properties:
        error: 
          type: string
          example: 'API Key invàlida o inexistent'
      required:
        - error

  # Exemples de respostes d'error
  examples:
    error401:
      value:
        error: "API Key invàlida o inexistent"
    error404:
      value:
        error: "Recurs no trobat"
    error422:
      value:
        error: "La validació ha fallat: Subject no pot estar en blanc"
        
paths:
  /statuses:
    get:
      tags:
        - Statuses
      summary: Llista tots els estats (Statuses).
      operationId: getAllStatuses
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'

    post:
      tags:
        - Statuses
      summary: Crea un nou estat (Status).
      operationId: createStatus
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        description: Dades del nou estat.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: 'Blocked'
                color:
                  type: string
                  example: '#000000'
      responses:
        '201':
          description: Estat creat correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '422':
          description: Entitat no processable (Errors de validació).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error422'

  /statuses/{id}:
    get:
      tags:
        - Statuses
      summary: Obté un estat (Status) pel seu ID.
      operationId: getStatusById
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          description: ID de l'estat.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'

    put:
      tags:
        - Statuses
      summary: Actualitza un estat (Status) existent.
      operationId: updateStatus
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
      responses:
        '200':
          description: Estat actualitzat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
        '422':
          description: Errors de validació.

    delete:
      tags:
        - Statuses
      summary: Elimina un estat (Status).
      operationId: deleteStatus
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Eliminat correctament (Sense contingut).
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
  /priorities:
    get:
      tags:
        - Priorities
      summary: Llista totes les prioritats (Priorities).
      operationId: getAllPriorities
      security:
