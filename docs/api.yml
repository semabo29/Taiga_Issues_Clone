openapi: 3.0.3
info:
  title: Taiga Clone API
  description: API RESTful para la gestió d'Issues del projecte ASW (Segon Lliurament).
  version: 1.0.0
servers:
  - url: /api/v1
    description: Servidor principal
    
# Seguretat a nivel global
security:
  - ApiKeyHeader: []
  - ApiKeyParam: []

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Clau d'API enviada a la capçalera (Recomanat).
    ApiKeyParam:
      type: apiKey
      in: query
      name: api_key
      description: Clau d'API enviada com a paràmetre a la URL.

  schemas:
    # configuracio
    Status:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'New' }
        color: { type: string, example: '#83EEDE' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Priority:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'High' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Severity:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Important' }
        color: { type: string, example: '#E4A33D' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    IssueType:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Bug' }
        color: { type: string, example: '#E44057' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Tag:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Frontend' }
        color: { type: string, example: '#00b19d' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    
    DeadlineShortcut:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        name: { type: string, example: 'Next Week' }
        offset_days: { type: integer, example: 7 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        
    # models principals
    User:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        username: { type: string, example: 'carlesf' }
        email: { type: string, example: 'carlesf@example.com' }
        description: { type: string, example: 'Faculty member at UPC', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: integer, format: int64, example: 101 }
        subject: { type: string, example: 'Fix broken urls in main page' }
        description: { type: string, example: 'It is trivial to implement.', nullable: true }
        user_id: { type: integer, format: int64, example: 1 }
        status_id: { type: integer, format: int64, example: 1, nullable: true }
        priority_id: { type: integer, format: int64, example: 2, nullable: true }
        severity_id: { type: integer, format: int64, example: 3, nullable: true }
        issue_type_id: { type: integer, format: int64, example: 1, nullable: true }
        assigned_to_id: { type: integer, format: int64, example: 2, nullable: true }
        deadline: { type: string, format: date, example: '2026-05-10', nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        content: { type: string, example: 'No way, man!' }
        issue_id: { type: integer, format: int64, example: 101 }
        user_id: { type: integer, format: int64, example: 2 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # errors
    ErrorResult:
      type: object
      properties:
        error: 
          type: string
          example: 'API Key invàlida o inexistent'
      required:
        - error

  # Exemples de respostes d'error
  examples:
    error401:
      value:
        error: "API Key invàlida o inexistent"
    error404:
      value:
        error: "Recurs no trobat"
    error422:
      value:
        error: "La validació ha fallat: Subject no pot estar en blanc"
        
paths:
  /issues:
    get:
      tags:
        - Issues
      summary: Llista totes les incidències (Issues) amb filtres i ordenació.
      operationId: getAllIssues
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: query
          in: query
          description: Cerca de text al 'subject' o 'description'.
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Columna per ordenar (id, issue_type_id, severity_id, priority_id, deadline, status_id, assigned_to_id, user_id).
          required: false
          schema:
            type: string
        - name: direction
          in: query
          description: Direcció de l'ordenació (asc o desc).
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: issue_type_id
          in: query
          description: Filtrar per tipus d'incidència.
          required: false
          schema:
            type: integer
        - name: status_id
          in: query
          description: Filtrar per estat.
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Operació reeixida. Retorna la llista d'incidències filtrada.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat
    post:
      tags:
        - Issues
      summary: Crea una nova incidència (Issue).
      operationId: createIssue
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      requestBody:
        description: Dades de la nova incidència.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subject
              properties:
                subject:
                  type: string
                  example: 'Fix broken API endpoint'
                description:
                  type: string
                  example: 'The endpoint /api/v1/users is returning a 500 error.'
                status_id:
                  type: integer
                  example: 1
                priority_id:
                  type: integer
                  example: 2
                severity_id:
                  type: integer
                  example: 3
                issue_type_id:
                  type: integer
                  example: 1
                assigned_to_id:
                  type: integer
                  example: 2
                deadline:
                  type: string
                  format: date
                  example: '2026-05-20'
                tag_ids:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        '201':
          description: Incidència creada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '422':
          description: Entitat no processable (Errors de validació).
  /issues/{id}:
    get:
      tags:
        - Issues
      summary: Obté els detalls d'una incidència (Issue) pel seu ID.
      operationId: getIssueById
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          description: ID de la incidència.
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Operació reeixida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '404':
          description: Recurs no trobat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
    put:
      tags:
        - Issues
      summary: Actualitza una incidència (només pel creador).
      operationId: updateIssue
      security:
        - ApiKeyHeader: []
        - ApiKeyParam: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                description:
                  type: string
                status_id:
                  type: integer
                priority_id:
                  type: integer
                severity_id:
                  type: integer
                issue_type_id:
                  type: integer
                assigned_to_id:
                  type: integer
                deadline:
                  type: string
                  format: date
                tag_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Incidència actualitzada correctament.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          description: No autoritzat.
        '403':
          description: Prohibit. No ets el creador de la incidència.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '404':
          description: Recurs no trobat.
        '422':
          description: Errors de validació.
  
