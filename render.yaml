databases:
  - name: aswtaiga-db
    databaseName: aswtaiga
    user: aswtaiga
    plan: free

services:
  - type: web
    name: aswtaiga-web
    runtime: ruby
    plan: free
    # Fem servir una ordre directa perquè no et falli el fitxer bin/render-build.sh
    buildCommand: "bundle install; bundle exec rails assets:precompile; bundle exec rails assets:clean"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aswtaiga-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2